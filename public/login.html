<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - OrganDonate</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <a href="/" class="nav-brand">
            <span class="icon">💚</span>
            <span>OrganDonate</span>
        </a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/donor-list.html">Donors</a></li>
            <li><a href="/register.html">Register</a></li>
        </ul>
        <div class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')">
            <span></span><span></span><span></span>
        </div>
        <div class="nav-auth">
            <a href="/login.html" class="btn btn-outline btn-sm active">Login</a>
            <a href="/register.html" class="btn btn-primary btn-sm">Register</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <div class="form-container">
                <div class="form-card animate-in">
                    <h2>Welcome Back</h2>
                    <p class="subtitle">Login to your account to continue</p>

                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label for="login-email">Email Address</label>
                            <input type="email" id="login-email" placeholder="Enter your email" required>
                        </div>

                        <div class="form-group">
                            <label for="login-password">Password</label>
                            <input type="password" id="login-password" placeholder="Enter your password" required
                                minlength="6">
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg"
                            style="width: 100%; justify-content: center; margin-top: 0.5rem;">
                            Login
                        </button>
                    </form>

                    <p class="text-center mt-2" style="color: var(--text-secondary); font-size: 0.9rem;">
                        Don't have an account? <a href="/register.html">Register here</a>
                    </p>

                    <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-glass);">
                        <p
                            style="color: var(--text-muted); font-size: 0.8rem; text-align: center; margin-bottom: 0.75rem;">
                            Quick Login (Demo)</p>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;">
                            <button onclick="quickLogin('admin@admin.com', 'admin123')" class="btn btn-sm btn-outline"
                                style="justify-content: center;">
                                👑 Admin
                            </button>
                            <button onclick="quickLogin('donor@demo.com', 'demo123')" class="btn btn-sm btn-outline"
                                style="justify-content: center;">
                                🩸 Donor
                            </button>
                            <button onclick="quickLogin('patient@demo.com', 'demo123')" class="btn btn-sm btn-outline"
                                style="justify-content: center;">
                                🏥 Patient
                            </button>
                            <button onclick="quickLogin('hospital@demo.com', 'demo123')" class="btn btn-sm btn-outline"
                                style="justify-content: center;">
                                🏢 Hospital
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        function quickLogin(email, password) {
            document.getElementById('login-email').value = email;
            document.getElementById('login-password').value = password;
        }
    </script>
</body>

</html>
